<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="color-scheme" content="light dark" />
  <title>我的图床</title>

  <meta
    name="description"
    content="小图上传工具，支持图片上传、直链获取与 Markdown 插入格式复制。"
  />
  <meta name="robots" content="index,follow,max-image-preview:large" />
  <meta name="theme-color" content="#0f172a" />
  <link rel="canonical" href="https://pic.jsw.ac.cn/" />

  <link rel="icon" href="/favicon.ico" sizes="any" />

  <meta property="og:type" content="website" />
  <meta property="og:title" content="小图上传" />
  <meta
    property="og:description"
    content="支持图片上传、直链获取与 Markdown 插入格式复制。"
  />
  <meta property="og:url" content="https://pic.jsw.ac.cn/" />
  <meta property="og:site_name" content="小图上传" />

  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="小图上传" />
  <meta
    name="twitter:description"
    content="支持图片上传、直链获取与 Markdown 插入格式复制。"
  />

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "小图上传",
    "applicationCategory": "UtilitiesApplication",
    "operatingSystem": "Any",
    "description": "支持图片上传、直链获取与 Markdown 插入格式复制。",
    "url": "https://pic.jsw.ac.cn/"
  }
  </script>

  <link rel="preconnect" href="https://challenges.cloudflare.com" />
  <link rel="stylesheet" href="/assets/app.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand">
        <h1 id="pageTitle">小图上传</h1>
      </div>

      <div class="topbar-actions">
        <label class="lang-field" for="langSelect">
          <span id="langLabel">语言</span>
          <select id="langSelect" aria-label="Language">
            <option value="zh-Hans">简体中文</option>
            <option value="zh-Hant">繁體中文</option>
            <option value="en">English</option>
          </select>
        </label>
      </div>
    </header>

    <main class="single-panel-wrap">
      <section class="panel single-panel" aria-labelledby="uploadHeading">
        <div class="panel-header">
          <h2 id="uploadHeading">上传</h2>
        </div>

        <form id="uploadForm" novalidate>
          <div class="field">
            <label for="fileInput" id="fileLabel">图片</label>
            <input
              id="fileInput"
              name="file"
              type="file"
              accept="image/*"
              required
              aria-describedby="fileHint"
            />
            <p id="fileHint" class="field-hint">单张，小于 5.5 MB</p>
          </div>

          <div id="previewCard" class="preview-card empty" aria-live="polite">
            <div class="preview-meta">
              <strong id="previewName">未选择</strong>
              <span id="previewSize">-</span>
            </div>
            <div class="preview-media-wrap">
              <img id="previewImage" alt="" hidden />
            </div>
          </div>

          <div class="field">
            <label for="cookieInput" id="cookieLabel">Cookie</label>
            <textarea
              id="cookieInput"
              name="cookie"
              rows="7"
              spellcheck="false"
              autocomplete="off"
              aria-describedby="cookieHint cookieHelp"
            ></textarea>

            <p id="cookieHint" class="field-hint">
              请输入闲鱼创作平台登录后的完整 Cookie。该内容仅用于本次上传请求；勾选“记住”后会保存在当前浏览器本地。
            </p>

            <p id="cookieHelp" class="field-hint">
              如果你不知道如何获取 Cookie，请先阅读
              <a
                id="cookieGuideLink"
                class="inline-link"
                href="https://example.com/how-to-get-cookie"
                target="_blank"
                rel="noopener noreferrer nofollow"
              >这篇文章</a>。
            </p>
          </div>

          <div class="inline-actions">
            <label class="checkbox-row">
              <input id="rememberCookie" type="checkbox" />
              <span id="rememberLabel">记住</span>
            </label>

            <button id="clearCookieBtn" type="button" class="btn btn-secondary">
              清除
            </button>
          </div>

          <div class="field">
            <label id="verifyLabel">验证</label>
            <div id="turnstileBox" class="turnstile-box" aria-live="polite"></div>
            <p id="verifyHint" class="field-hint">完成后可上传</p>
          </div>

          <div class="submit-row">
            <button id="submitBtn" type="submit" class="btn btn-primary" disabled>
              上传图片
            </button>
          </div>

          <div id="statusBar" class="status-bar" role="status" aria-live="polite"></div>
        </form>
      </section>
    </main>
  </div>

  <div
    id="resultModal"
    class="modal"
    hidden
    aria-hidden="true"
  >
    <div id="modalBackdrop" class="modal-backdrop"></div>

    <section
      class="modal-dialog"
      role="dialog"
      aria-modal="true"
      aria-labelledby="resultHeading"
      aria-describedby="resultDesc"
    >
      <div class="modal-header">
        <h2 id="resultHeading">上传结果</h2>
        <button id="closeModalBtn" type="button" class="icon-btn" aria-label="关闭">×</button>
      </div>

      <p id="resultDesc" class="modal-desc">上传成功后，这里会显示图片直链和 Markdown。</p>

      <div class="result-preview-wrap modal-preview-wrap">
        <img id="resultImage" alt="" hidden />
      </div>

      <div class="result-group">
        <label for="imageUrlOutput" id="urlLabel">直链</label>
        <textarea id="imageUrlOutput" rows="3" readonly></textarea>
        <button type="button" class="btn btn-secondary copy-btn" data-copy-target="imageUrlOutput" id="copyUrlBtn">
          复制直链
        </button>
      </div>

      <div class="result-group">
        <label for="markdownOutput" id="mdLabel">Markdown</label>
        <textarea id="markdownOutput" rows="3" readonly></textarea>
        <button type="button" class="btn btn-secondary copy-btn" data-copy-target="markdownOutput" id="copyMdBtn">
          复制 Markdown
        </button>
      </div>

      <div class="modal-actions">
        <a
          id="openImageLink"
          class="btn btn-secondary"
          href="#"
          target="_blank"
          rel="noopener noreferrer"
        >打开图片</a>
        <button id="closeModalBtnBottom" type="button" class="btn btn-primary">完成</button>
      </div>
    </section>
  </div>

  <script>
    window.onTurnstileLoad = function () {
      window.__turnstileLoaded = true;
      window.dispatchEvent(new CustomEvent('turnstile-ready'));
    };
  </script>
  <script
    src="https://challenges.cloudflare.com/turnstile/v0/api.js?render=explicit&onload=onTurnstileLoad"
    async
    defer
  ></script>
  <script src="/assets/app.js" defer></script>
</body>
</html>
